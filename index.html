<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平權不平權？— 社會地位馬拉松</title>
    <style>
        :root { --dark: #0f172a; --gold: #ffb700; --blue: #3b82f6; --red: #ef4444; --green: #22c55e; --panel: #1e293b; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--dark); color: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: #1e293b; width: 95%; max-width: 1200px; border-radius: 28px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); margin: 20px; padding: 30px; border: 1px solid #334155; position: relative; }
        .page { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.4s; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 3rem; color: var(--gold); margin: 10px 0; text-shadow: 3px 3px 0 #000; text-align: center; }
        .slogan { font-style: italic; color: #94a3b8; margin-bottom: 30px; text-align: center; max-width: 850px; line-height: 1.6; font-size: 1.1rem; }

        .q-display-board { background: #0f172a; border-left: 10px solid var(--gold); padding: 25px; width: 100%; border-radius: 15px; margin-bottom: 25px; box-sizing: border-box; min-height: 120px; display: flex; align-items: center; }
        .q-text { font-size: 26px; font-weight: bold; color: var(--gold); line-height: 1.6; }
        .q-hidden { color: #475569; font-style: italic; font-weight: normal; }

        .btn { padding: 12px 24px; border-radius: 14px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 15px; color: white; margin: 5px; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        
        .tab-menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; border-bottom: 2px solid #334155; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 17px; font-weight: bold; padding: 12px; white-space: nowrap; }
        .tab-btn.active { color: var(--gold); border-bottom: 4px solid var(--gold); }
        
        .admin-section { display: none; width: 100%; flex-direction: column; }
        .admin-section.active { display: flex; }

        .group-box { background: #334155; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #475569; }
        .group-title { color: var(--gold); font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid #475569; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .editor-grid { display: flex; flex-direction: column; gap: 10px; }
        .q-item { display: flex; gap: 10px; align-items: center; background: #1e293b; padding: 10px; border-radius: 10px; }
        input, textarea { background: #0f172a; color: #fff; padding: 12px; border: 1px solid #475569; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 14px; }
        
        canvas { background: #1a1a1a; border-radius: 15px; width: 100%; border: 6px solid #334155; margin: 20px 0; }
        .char-card { background: #2d3748; border: 2px solid #475569; padding: 20px; border-radius: 15px; cursor: pointer; text-align: left; transition: 0.3s; }
        .char-tag { font-size: 12px; background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 5px; margin: 8px 0 3px 0; display: inline-block; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="page-home" class="page active">
        <h1>平權不平權？</h1>
        <div class="slogan">「我們都在跑馬拉松，只是有人是坐保姆車，有人是光腳，起點與終點由誰決定？」</div>
        <div style="display:flex; flex-wrap: wrap; justify-content:center; gap: 20px;">
            <button class="btn" style="background:var(--blue); width:320px; height:110px; font-size:22px;" onclick="window.showPage('page-sim-select')">🎭 命運劇本</button>
            <button class="btn" style="background:var(--green); width:320px; height:110px; font-size:22px;" onclick="window.joinRealMode()">🏗️ 生存大亂鬥</button>
        </div>
        <button class="btn" style="background:#334155; font-size:12px; margin-top:50px; opacity:0.5" onclick="window.showPage('page-login')">⚙️ 進入命運後台</button>
    </div>

    <div id="page-login" class="page">
        <h2>管理者驗證</h2>
        <input type="text" id="admin-user" placeholder="帳號">
        <input type="password" id="admin-pass" placeholder="密碼">
        <button class="btn" style="background:var(--blue); width:300px" onclick="window.verifyLogin()">進入控制台</button>
        <button class="btn" style="background:#475569; width:300px" onclick="window.showPage('page-home')">返回首頁</button>
    </div>

    <div id="page-sim-select" class="page">
        <h2>領取您的人生設定</h2>
        <div id="sim-char-list" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; width: 100%;"></div>
        <button class="btn" style="background:#475569; margin-top:30px" onclick="window.showPage('page-home')">返回</button>
    </div>

    <div id="page-game" class="page">
        <div class="q-display-board">
            <div id="current-q-text" class="q-text q-hidden">🔒 聽取導師佈題揭曉中...</div>
        </div>
        <div style="display:flex; justify-content: space-between; width:100%; align-items:center;">
            <div style="font-size:26px; font-weight:900;">社會關卡：【<span id="display-q-num">1</span>】</div>
            <div id="player-tag" style="font-weight:bold; padding: 10px 20px; border-radius:12px; border: 2px solid white;">載入中...</div>
        </div>
        <canvas id="mainCanvas" width="1000" height="420"></canvas>

        <div id="teacher-controls" class="page" style="display:none; padding:0;">
            <div class="tab-menu">
                <button id="tab-sys" class="tab-btn active" onclick="window.switchTab('sys')">🕹️ 系統主控</button>
                <button id="tab-q" class="tab-btn" onclick="window.switchTab('q')">📝 題庫編輯</button>
                <button id="tab-c" class="tab-btn" onclick="window.switchTab('c')">👥 角色編輯</button>
                <button class="tab-btn" style="color:var(--red)" onclick="window.showPage('page-home')">🏠 回首頁</button>
            </div>

            <div id="sec-sys" class="admin-section active">
                <div class="group-box" style="text-align:center;">
                    <div class="group-title">即時命運導覽</div>
                    <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin: 15px 0;">
                        <button class="btn" style="background:#475569; width:120px" onclick="window.dbChangeQ(-1)">◀ 上一題</button>
                        <div style="font-size:32px; font-weight:bold; color:var(--gold)">第 <span id="admin-q-num">1</span> 題</div>
                        <button class="btn" style="background:#475569; width:120px" onclick="window.dbChangeQ(1)">下一題 ▶</button>
                    </div>
                    <div style="display:flex; justify-content:center; gap:10px;">
                        <button id="reveal-btn-admin" class="btn" style="flex:1" onclick="window.dbToggleReveal(true)">👁️ 揭曉目前題目</button>
                        <button id="hide-btn-admin" class="btn" style="flex:1" onclick="window.dbToggleReveal(false)">🔒 隱藏題目</button>
                    </div>
                </div>
                <div class="group-box">
                    <div class="group-title">全局控制</div>
                    <button id="pause-btn-admin" class="btn" style="width:100%; height:70px; font-size:20px;" onclick="window.dbTogglePause()">⏸ 啟動全體凍結</button>
                    <button class="btn" style="background:var(--red); width:100%; margin-top:20px;" onclick="window.dbReset()">🧨 數據大清洗 (重新生成分類結構)</button>
                </div>
            </div>

            <div id="sec-q" class="admin-section">
                <div id="q-groups-container" style="max-height: 550px; overflow-y: auto;"></div>
            </div>

            <div id="sec-c" class="admin-section">
                <button class="btn" style="background:var(--blue); margin-bottom:15px;" onclick="window.addCharacter()">➕ 新增模擬角色</button>
                <div id="char-editor-container"></div>
            </div>
        </div>

        <div id="student-controls" style="margin-top:20px; text-align:center; width: 100%;">
            <p id="lock-msg" style="color:var(--red); font-size: 24px; font-weight:900; background:white; padding:15px; border-radius:12px; display:none; border: 4px solid var(--red);">⏸ 社會已暫停！請專心聽講 ⏸</p>
            <div id="move-btns-group">
                <div style="display:flex; gap:15px; justify-content:center;">
                    <button id="btn-back" class="btn" style="background:var(--red); width:170px; height:85px; font-size:20px;" onclick="window.dbMove(-1)">◀ 退後一步</button>
                    <button id="btn-stay" class="btn" style="background:#64748b; width:170px; height:85px; font-size:20px;" onclick="window.dbMove(0)">留在原地</button>
                    <button id="btn-forward" class="btn" style="background:var(--green); width:170px; height:85px; font-size:20px;" onclick="window.dbMove(1)">向前一步 ▶</button>
                </div>
                <button id="btn-undo" class="btn" style="background:#334155; width:80%; margin-top:15px; display:none;" onclick="window.dbUndo()">↺ 重新考慮 (本題重新選擇)</button>
            </div>
            <p id="move-status-msg" style="margin-top:15px; color:var(--gold); font-weight:bold; font-size:18px;"></p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDyO58BVHMHr7hJIIchVDlq5uD91D5W0o",
      authDomain: "equity-game-a26fc.firebaseapp.com",
      databaseURL: "https://equity-game-a26fc-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "equity-game-a26fc",
      storageBucket: "equity-game-a26fc.firebasestorage.app",
      messagingSenderId: "247557188175",
      appId: "1:247557188175:web:84e3232995e337a273983a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'equity-game-v8-pro');

    let myUID = localStorage.getItem('equity_v8_pro_uid');
    let myRole = null; 
    let serverData = { q: 1, isRevealed: false, status: 'running', players: {}, questionsGroup: [], configChars: [] };

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        document.getElementById('sec-'+tab).classList.add('active');
    };

    window.verifyLogin = () => {
        if(document.getElementById('admin-user').value === 'admin' && document.getElementById('admin-pass').value === '2803') {
            myRole = 'teacher';
            document.getElementById('teacher-controls').style.display = 'flex';
            document.getElementById('student-controls').style.display = 'none';
            document.getElementById('player-tag').innerText = "👨‍🏫 命運規劃師";
            window.showPage('page-game');
        } else { alert('驗證失敗'); }
    };

    // --- 動態題庫管理 ---
    window.addQuestion = (groupIndex) => {
        const group = serverData.questionsGroup[groupIndex];
        if(!group.items) group.items = [];
        group.items.push("新題目內容...");
        set(ref(db, `equity-game-v8-pro/questionsGroup/${groupIndex}`), group);
    };

    window.removeQuestion = (groupIndex, itemIndex) => {
        if(!confirm("確定要刪除這道題目嗎？")) return;
        const group = serverData.questionsGroup[groupIndex];
        group.items.splice(itemIndex, 1);
        set(ref(db, `equity-game-v8-pro/questionsGroup/${groupIndex}`), group);
    };

    window.updateQuestionText = (groupIndex, itemIndex) => {
        const text = document.getElementById(`q-input-${groupIndex}-${itemIndex}`).value;
        set(ref(db, `equity-game-v8-pro/questionsGroup/${groupIndex}/items/${itemIndex}`), text);
    };

    // --- 角色增減 ---
    window.addCharacter = () => {
        const nextIdx = serverData.configChars.length;
        const randomCol = "hsl(" + (Math.random() * 360) + ", 70%, 50%)";
        set(ref(db, `equity-game-v8-pro/configChars/${nextIdx}`), {
            name: "新角色", color: randomCol, weekday: "平日情境...", weekend: "假日情境..."
        });
    };

    window.removeCharacter = (idx) => {
        if(!confirm("確定刪除角色？")) return;
        const newChars = [...serverData.configChars];
        newChars.splice(idx, 1);
        set(ref(db, `equity-game-v8-pro/configChars`), newChars);
    };

    window.updateCharConfig = (idx) => {
        const updates = {
            name: document.getElementById(`c-n-${idx}`).value,
            weekday: document.getElementById(`c-wd-${idx}`).value,
            weekend: document.getElementById(`c-we-${idx}`).value,
            color: serverData.configChars[idx].color
        };
        set(ref(db, `equity-game-v8-pro/configChars/${idx}`), updates);
    };

    // --- 遊戲邏輯 ---
    window.joinSimMode = (idx) => {
        const char = serverData.configChars[idx];
        setupPlayer(char.name, char.color, "sim_" + idx);
    };

    window.joinRealMode = () => {
        if(myUID && myUID.startsWith('real_')) setupPlayer(null, null, myUID);
        else {
            const currentCount = Object.keys(serverData.players || {}).filter(k => k.startsWith('real_')).length;
            setupPlayer("Player " + (currentCount + 1), "#94a3b8", "real_" + Math.random().toString(36).substr(2, 5));
        }
    }

    function setupPlayer(name, color, uid) {
        myUID = uid; localStorage.setItem('equity_v8_pro_uid', uid); myRole = 'student';
        get(ref(db, `equity-game-v8-pro/players/${uid}`)).then((snap) => {
            const d = snap.val();
            update(ref(db, `equity-game-v8-pro/players/${uid}`), { 
                name: d?.name || name, color: d?.color || color, 
                pos: d?.pos || 0, startPosOfQ: d?.pos || 0, lastMovedQ: d?.lastMovedQ || 0 
            });
            document.getElementById('player-tag').innerText = (d?.name || name);
            document.getElementById('player-tag').style.background = d?.color || color;
            window.showPage('page-game');
        });
    }

    window.dbChangeQ = (dir) => {
        const totalQs = serverData.questionsGroup.reduce((acc, g) => acc + (g.items ? g.items.length : 0), 0);
        const nextQ = serverData.q + dir;
        if(nextQ < 1 || nextQ > totalQs) return;
        const updates = { q: nextQ, isRevealed: false };
        for(let uid in serverData.players) { updates[`players/${uid}/startPosOfQ`] = serverData.players[uid].pos; }
        update(gameRef, updates);
    };

    window.dbToggleReveal = (show) => set(ref(db, 'equity-game-v8-pro/isRevealed'), show);
    window.dbTogglePause = () => set(ref(db, 'equity-game-v8-pro/status'), serverData.status === 'running' ? 'paused' : 'running');

    window.dbReset = () => {
        if(!confirm("確定大清洗？這將建立全新的分類題庫結構。")) return;
        const newStructure = [
            { title: "第一組：家庭與經濟資源（先天物質特權）", items: ["我住的房子是家裡買下的，不是租的。"] },
            { title: "第二組：社會資本與家庭後援（人際支持特權）", items: ["當我生病或需要幫助時，家長總能立刻請假陪我。"] },
            { title: "第三組：數位落差與地理位置（資訊獲取特權）", items: ["我家中有流暢的網路和專屬於我的電腦/平板。"] },
            { title: "第四組：自主學習與求知行為（後天內在動能）", items: ["我會主動到圖書館或網路上尋找我感興趣的知識。"] },
            { title: "第五組：韌性、責任與實踐力（持續前進的關鍵）", items: ["遇到困難時，我願意多嘗試幾次而不是直接放棄。"] }
        ];
        set(gameRef, { 
            q: 1, isRevealed: false, status: 'running', players: {}, questionsGroup: newStructure,
            configChars: [
                {name: "達嗨", color: "#3b82f6", weekday: "清晨醒來。要走 40 分鐘山路去搭車。手機訊號不穩...", weekend: "跟爺爺巡視農地。期待未來但也孤單。"},
                {name: "維恩", color: "#fbbf24", weekday: "豪宅醒來，保姆車內有 Wi-Fi。未來哈佛是理所當然...", weekend: "社交時間。下午飛往日本看展。從不擔心錢。"},
                {name: "小明", color: "#f472b6", weekday: "普通家庭，蛋餅配賴床。走路 10 分鐘上學...", weekend: "下午跟同學約打籃球。平凡無慮。"},
                {name: "小晴", color: "#fb923c", weekday: "凌晨幫奶奶換尿布。媽媽 7 點下班前她就是小大人...", weekend: "週末是大掃除日。沒預算買書。"},
                {name: "阿諾", color: "#a78bfa", weekday: "依賴輪椅。最孤獨的是體育課。實驗課桌面太高...", weekend: "巷弄違停讓輪椅過不去。到處是隱形牆。"}
            ]
        });
        alert("數據結構已更新。");
    };

    window.dbMove = (dir) => {
        const p = serverData.players[myUID];
        if(!p || serverData.status === 'paused') return;
        update(ref(db, `equity-game-v8-pro/players/${myUID}`), { pos: Math.max(0, p.startPosOfQ + dir), lastMovedQ: serverData.q });
    };

    window.dbUndo = () => {
        const p = serverData.players[myUID];
        update(ref(db, `equity-game-v8-pro/players/${myUID}`), { pos: p.startPosOfQ, lastMovedQ: 0 });
    };

    // --- 資料同步與渲染 ---
    onValue(gameRef, (snap) => {
        const d = snap.val(); if(!d) return;
        const oldGroupsLen = serverData.questionsGroup ? serverData.questionsGroup.length : 0;
        const oldCharsLen = serverData.configChars ? serverData.configChars.length : 0;
        serverData = d;
        serverData.players = d.players || {};
        serverData.questionsGroup = d.questionsGroup || [];
        serverData.configChars = d.configChars || [];

        document.getElementById('display-q-num').innerText = d.q;
        document.getElementById('admin-q-num').innerText = d.q;
        
        // 攤平題庫用於顯示
        const allQuestions = [];
        serverData.questionsGroup.forEach(g => { if(g.items) g.items.forEach(it => allQuestions.push(it)); });

        const qBox = document.getElementById('current-q-text');
        if(d.isRevealed) {
            qBox.innerText = allQuestions[d.q - 1] || "尚未編輯內容...";
            qBox.classList.remove('q-hidden');
        } else {
            qBox.innerText = "🔒 聽取導師佈題揭曉中...";
            qBox.classList.add('q-hidden');
        }

        if(myRole === 'teacher') {
            const pBtn = document.getElementById('pause-btn-admin');
            const isPaused = d.status === 'paused';
            pBtn.innerText = isPaused ? "▶ 恢復社會運作 (Resume)" : "⏸ 啟動全體凍結 (Freeze)";
            pBtn.style.background = isPaused ? "var(--green)" : "#f59e0b";
            
            // 題庫編輯器 (只有在長度變動或第一次載入時重建，避免輸入時跳動)
            const qContainer = document.getElementById('q-groups-container');
            if(qContainer.innerHTML === "" || serverData._lastChangeType === 'structure') {
                qContainer.innerHTML = "";
                serverData.questionsGroup.forEach((group, gIdx) => {
                    let html = `<div class="group-box">
                        <div class="group-title">${group.title} <button class="btn" style="background:var(--blue); padding:5px 10px; font-size:12px;" onclick="window.addQuestion(${gIdx})">➕ 增題</button></div>
                        <div class="editor-grid">`;
                    if(group.items) {
                        group.items.forEach((item, iIdx) => {
                            html += `<div class="q-item">
                                <span>${iIdx+1}.</span>
                                <input id="q-input-${gIdx}-${iIdx}" value="${item}">
                                <button class="btn" style="background:var(--green); padding:5px;" onclick="window.updateQuestionText(${gIdx}, ${iIdx})">存</button>
                                <button class="btn" style="background:var(--red); padding:5px;" onclick="window.removeQuestion(${gIdx}, ${iIdx})">❌</button>
                            </div>`;
                        });
                    }
                    html += `</div></div>`;
                    qContainer.innerHTML += html;
                });
            }

            // 角色編輯
            const cContainer = document.getElementById('char-editor-container');
            if(cContainer.innerHTML === "" || oldCharsLen !== serverData.configChars.length) {
                cContainer.innerHTML = "";
                serverData.configChars.forEach((c, i) => {
                    cContainer.innerHTML += `<div class="group-box">
                        <div class="group-title">角色 #${i+1} <button class="btn" style="background:var(--red); padding:5px 10px; font-size:12px;" onclick="window.removeCharacter(${i})">刪除</button></div>
                        名稱：<input id="c-n-${i}" value="${c.name}">
                        平日：<textarea id="c-wd-${i}" rows="2">${c.weekday || ''}</textarea>
                        假日：<textarea id="c-we-${i}" rows="2">${c.weekend || ''}</textarea>
                        <button class="btn" style="background:var(--blue); width:100%;" onclick="window.updateCharConfig(${i})">儲存</button>
                    </div>`;
                });
            }
        }

        const simList = document.getElementById('sim-char-list');
        if(simList.innerHTML === "" || oldCharsLen !== serverData.configChars.length) {
            simList.innerHTML = "";
            serverData.configChars.forEach((c, i) => {
                simList.innerHTML += `<div class="char-card" onclick="window.joinSimMode(${i})">
                    <h3 style="margin:0; color:var(--gold)">${c.name}</h3>
                    <div class="char-tag">🗓️ 平日</div><div style="font-size:13px; color:#ccc;">${c.weekday}</div>
                    <div class="char-tag">⛱️ 假日</div><div style="font-size:13px; color:#ccc;">${c.weekend}</div>
                </div>`;
            });
        }

        if(myRole === 'student') {
            const p = serverData.players[myUID];
            const hasMoved = p && p.lastMovedQ === serverData.q;
            const isPaused = serverData.status === 'paused';
            document.getElementById('move-btns-group').style.display = isPaused ? "none" : "block";
            document.getElementById('lock-msg').style.display = isPaused ? "block" : "none";
            document.getElementById('btn-undo').style.display = (hasMoved && !isPaused) ? "inline-block" : "none";
            document.getElementById('move-status-msg').innerText = isPaused ? "⏸ 命運凍結中" : (hasMoved ? "✅ 已完成本題抉擇" : (d.isRevealed ? "⚡ 請做出選擇" : "💭 聽取導師口述題目..."));
            document.getElementById('btn-stay').style.display = hasMoved ? "none" : "inline-block";
            document.getElementById('btn-back').style.display = hasMoved ? "none" : "inline-block";
            document.getElementById('btn-forward').style.display = hasMoved ? "none" : "inline-block";
        }
    });

    const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d');
    let localX = {};
    function render() {
        ctx.clearRect(0,0,1000,420);
        const sx = 150; const sd = 20;
        ctx.strokeStyle = "rgba(255,255,255,0.05)"; 
        for(let i=0; i<15; i++) ctx.strokeRect(20, 50+(i*25), 960, 25);
        ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(sx, 40); ctx.lineTo(sx, 410); ctx.stroke();
        ctx.fillStyle = "#22c55e"; ctx.font = "bold 14px sans-serif"; ctx.fillText("理想起跑線", sx-35, 30);

        Object.keys(serverData.players).forEach((uid, i) => {
            const p = serverData.players[uid];
            if(!localX[uid]) localX[uid] = sx;
            localX[uid] += (sx + (p.pos*sd) - localX[uid]) * 0.1;
            const y = 65 + (i*25);
            ctx.beginPath(); ctx.arc(localX[uid], y, 10, 0, Math.PI*2);
            ctx.fillStyle = p.color; ctx.fill();
            if(uid === myUID) { ctx.strokeStyle="#fff"; ctx.lineWidth=3; ctx.stroke(); }
            ctx.fillStyle="#cbd5e1"; ctx.textAlign="left"; ctx.font="10px sans-serif";
            ctx.fillText(p.name, localX[uid]+15, y+4);
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
