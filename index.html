<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平全不平權？— 社會生存模擬器</title>
    <style>
        :root { --dark: #121212; --gold: #ffd700; --blue: #3182ce; --red: #e53e3e; --green: #38a169; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--dark); color: #eee; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: #1e1e1e; width: 95%; max-width: 1100px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); margin: 20px; padding: 30px; position: relative; border: 1px solid #333; }
        .page { display: none; flex-direction: column; align-items: center; width: 100%; animation: slideUp 0.4s ease-out; }
        .page.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 題目看板風格 */
        .q-display-board { background: #2d2d2d; border-left: 8px solid var(--gold); padding: 20px; width: 100%; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; min-height: 80px; }
        .q-text { font-size: 24px; font-weight: bold; color: var(--gold); }

        .btn { padding: 15px 30px; border-radius: 14px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 18px; color: white; margin: 10px; box-shadow: 0 6px 0px rgba(0,0,0,0.2); text-transform: uppercase; }
        .btn:disabled { background: #444 !important; opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: translateY(4px); }
        .btn-mode { width: 320px; height: 100px; font-size: 20px; }
        
        .char-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 15px; width: 100%; }
        .char-card { background: #2d2d2d; border: 2px solid #444; padding: 15px; border-radius: 18px; cursor: pointer; text-align: center; }
        
        /* 編輯器樣式 */
        .editor-section { background: #2d3748; padding: 15px; border-radius: 12px; margin-top: 15px; width: 100%; text-align: left; }
        input, textarea { background: #333; color: #fff; padding: 10px; border: 1px solid #444; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        
        canvas { background: #222; border-radius: 12px; width: 100%; margin: 20px 0; border: 4px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-home" class="page active">
        <h1>平全不平權？</h1>
        <div style="display:flex; flex-wrap: wrap; justify-content:center; gap: 20px;">
            <button class="btn btn-mode" style="background:var(--blue)" onclick="window.showPage('page-sim-select')">🎭 角色模擬器</button>
            <button class="btn btn-mode" style="background:var(--green)" onclick="window.joinRealMode()">🏗️ 生存大亂鬥</button>
        </div>
        <button class="btn" style="background:#444; font-size:14px; margin-top:30px;" onclick="window.showPage('page-login')">🔑 命運後台</button>
    </div>

    <div id="page-login" class="page">
        <h2>管理者驗證</h2>
        <input type="text" id="admin-user" placeholder="帳號">
        <input type="password" id="admin-pass" placeholder="密碼">
        <button class="btn" style="background:var(--blue); width:100%" onclick="window.verifyLogin()">登入</button>
        <button class="btn" style="background:#555; width:100%" onclick="window.showPage('page-home')">返回</button>
    </div>

    <div id="page-sim-select" class="page">
        <h2>選擇出生劇本</h2>
        <div class="char-grid" id="sim-char-list"></div>
    </div>

    <div id="page-game" class="page">
        <div class="q-display-board">
            <div style="font-size:12px; color:#aaa; margin-bottom:5px;">目前情境投放：</div>
            <div id="current-q-text" class="q-text">等待導師佈題中...</div>
        </div>

        <div style="display:flex; justify-content: space-between; width:100%; align-items:center;">
            <div style="font-size:24px; font-weight:900;">關卡：<span id="display-q-num">0</span></div>
            <div id="player-tag" style="padding: 10px 20px; border-radius:12px; font-weight:bold;">載入中...</div>
        </div>
        
        <canvas id="mainCanvas" width="1000" height="420"></canvas>

        <div id="teacher-controls" class="page" style="display:none; padding:0;">
            <div class="editor-section">
                <b>📝 佈題編輯器：</b>
                <textarea id="edit-q-text" placeholder="請輸入目前的社會情境題目..."></textarea>
                <button class="btn" style="background:var(--gold); color:#000; width:100%; margin:0;" onclick="window.dbUpdateQ()">更新題目並換題 ➔</button>
            </div>
            
            <div class="editor-section">
                <b>👥 角色背景編輯 (模擬模式用)：</b>
                <div id="char-editor-list"></div>
            </div>

            <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
                <button id="pause-btn" class="btn" style="background:#ed8936; flex:1" onclick="window.dbTogglePause()">⏸ 凍結</button>
                <button class="btn" style="background:var(--red); flex:1" onclick="window.dbReset()">🧨 數據清空</button>
            </div>
        </div>

        <div id="student-controls" style="margin-top:20px; text-align:center;">
            <div id="move-btns">
                <button id="btn-back" class="btn" style="background:var(--red); width:160px; height:80px;" onclick="window.dbMove(-1)">◀ 受挫</button>
                <button id="btn-forward" class="btn" style="background:var(--green); width:160px; height:80px;" onclick="window.dbMove(1)">努力 ▶</button>
            </div>
            <p id="move-msg" style="color:var(--gold); font-weight:bold; margin-top:10px;"></p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDyO58BVHMHr7hJIIchVDlq5uD91D5W0o",
      authDomain: "equity-game-a26fc.firebaseapp.com",
      databaseURL: "https://equity-game-a26fc-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "equity-game-a26fc",
      storageBucket: "equity-game-a26fc.firebasestorage.app",
      messagingSenderId: "247557188175",
      appId: "1:247557188175:web:84e3232995e337a273983a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'equity-game-v-kaohsiung');

    // 角色與狀態初始化
    let myUID = localStorage.getItem('equity_uid');
    let myRole = null; 
    let serverData = { q: 0, qText: "", status: 'running', players: {}, configChars: [] };

    // --- 全域函數掛載 ---
    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.verifyLogin = () => {
        if(document.getElementById('admin-user').value === 'admin' && document.getElementById('admin-pass').value === '2803') {
            myRole = 'teacher';
            document.getElementById('teacher-controls').style.display = 'flex';
            document.getElementById('student-controls').style.display = 'none';
            document.getElementById('player-tag').innerText = "👨‍🏫 管理員後台";
            window.showPage('page-game');
        } else { alert('身分驗證失敗'); }
    };

    // 進入模擬模式
    window.joinSimMode = (idx) => {
        const char = serverData.configChars[idx];
        setupPlayer(char.name, char.color, "sim_" + idx);
    };

    // 進入現實模式
    window.joinRealMode = () => {
        if(myUID && myUID.startsWith('real_')) {
            setupPlayer(null, null, myUID); // 沿用舊身分
        } else {
            const newUID = "real_" + Math.random().toString(36).substr(2, 6);
            setupPlayer("Player " + Math.floor(Math.random()*100), "#718096", newUID);
        }
    };

    function setupPlayer(name, color, uid) {
        myUID = uid;
        localStorage.setItem('equity_uid', uid);
        myRole = 'student';
        
        // 如果 Firebase 已有資料，優先沿用
        get(ref(db, `equity-game-v-kaohsiung/players/${uid}`)).then((snap) => {
            const data = snap.val();
            const finalName = data?.name || name;
            const finalColor = data?.color || color;
            update(ref(db, `equity-game-v-kaohsiung/players/${uid}`), { name: finalName, color: finalColor, lastMovedQ: data?.lastMovedQ || -1 });
            document.getElementById('player-tag').innerText = finalName;
            document.getElementById('player-tag').style.background = finalColor;
            window.showPage('page-game');
        });
    }

    // --- 管理員操作 ---
    window.dbUpdateQ = () => {
        const newText = document.getElementById('edit-q-text').value;
        update(gameRef, { q: serverData.q + 1, qText: newText });
    };

    window.dbTogglePause = () => set(ref(db, 'equity-game-v-kaohsiung/status'), serverData.status === 'running' ? 'paused' : 'running');
    
    window.dbReset = () => {
        if(confirm("重設將清空所有玩家與進度，確定嗎？")) {
            set(gameRef, { q: 0, qText: "等待佈題...", status: 'running', players: {}, 
                configChars: [
                    {name: "達嗨", desc: "布農部落的晨光", color: "#3182ce"},
                    {name: "維恩", desc: "豪宅裡的保姆車", color: "#ecc94b"},
                    {name: "小明", desc: "平凡的蛋餅人生", color: "#f687b3"},
                    {name: "小晴", desc: "市場裡的晚餐", color: "#f6ad55"},
                    {name: "阿諾", desc: "輪椅外的圍牆", color: "#9f7aea"}
                ]
            });
            location.reload();
        }
    };

    window.updateCharConfig = (idx) => {
        const n = document.getElementById(`edit-char-n-${idx}`).value;
        const d = document.getElementById(`edit-char-d-${idx}`).value;
        set(ref(db, `equity-game-v-kaohsiung/configChars/${idx}`), { name: n, desc: d, color: serverData.configChars[idx].color });
    };

    // --- 學生移動邏輯 (限一次) ---
    window.dbMove = (dir) => {
        const p = serverData.players[myUID];
        if(!p || serverData.status === 'paused') return;
        if(p.lastMovedQ === serverData.q) {
            alert("本回合你已經做出選擇了！");
            return;
        }
        const newPos = (p.pos || 0) + dir;
        update(ref(db, `equity-game-v-kaohsiung/players/${myUID}`), { pos: Math.max(0, newPos), lastMovedQ: serverData.q });
    };

    // --- 數據監聽與渲染 ---
    onValue(gameRef, (snap) => {
        const data = snap.val(); if(!data) return;
        serverData = data;
        serverData.players = data.players || {};
        serverData.configChars = data.configChars || [];
        
        document.getElementById('display-q-num').innerText = data.q;
        document.getElementById('current-q-text').innerText = data.qText;

        // 更新模擬角色選擇頁
        const list = document.getElementById('sim-char-list');
        list.innerHTML = "";
        serverData.configChars.forEach((c, i) => {
            list.innerHTML += `<div class="char-card" onclick="window.joinSimMode(${i})"><b style="color:${c.color}">${c.name}</b><br><small>${c.desc}</small></div>`;
        });

        // 教師編輯區更新
        if(myRole === 'teacher') {
            const edList = document.getElementById('char-editor-list');
            if(edList.innerHTML === "") {
                serverData.configChars.forEach((c, i) => {
                    edList.innerHTML += `<div>${c.name}: <input id="edit-char-n-${i}" value="${c.name}"> <input id="edit-char-d-${i}" value="${c.desc}"> <button onclick="window.updateCharConfig(${i})">保存</button></div>`;
                });
            }
        }

        // 學生按鈕狀態控管
        if(myRole === 'student') {
            const p = serverData.players[myUID];
            const hasMoved = p && p.lastMovedQ === serverData.q;
            const isPaused = serverData.status === 'paused';
            document.getElementById('btn-forward').disabled = hasMoved || isPaused;
            document.getElementById('btn-back').disabled = hasMoved || isPaused;
            document.getElementById('move-msg').innerText = hasMoved ? "✅ 本題已完成選擇，等待下一題..." : (isPaused ? "⏸ 導師暫停中" : "⚡ 請做出選擇");
        }
    });

    const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d');
    let localX = {};
    function render() {
        ctx.clearRect(0,0,1000,420);
        const sx = 150; const sd = 20;
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; 
        for(let i=0; i<10; i++) ctx.strokeRect(20, 50+(i*40), 960, 40);
        ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(sx, 40); ctx.lineTo(sx, 400); ctx.stroke();
        ctx.setLineDash([5,5]); ctx.strokeStyle = "#ffd700";
        ctx.beginPath(); ctx.moveTo(sx+(40*sd), 40); ctx.lineTo(sx+(40*sd), 400); ctx.stroke();
        ctx.setLineDash([]);
        
        Object.keys(serverData.players).forEach((uid, i) => {
            const p = serverData.players[uid];
            if(!localX[uid]) localX[uid] = sx;
            localX[uid] += (sx + (p.pos*sd) - localX[uid]) * 0.1;
            const y = 70 + (i*40);
            ctx.beginPath(); ctx.arc(localX[uid], y, 16, 0, Math.PI*2);
            ctx.fillStyle = p.color; ctx.fill();
            if(uid === myUID) { ctx.strokeStyle="#fff"; ctx.lineWidth=3; ctx.stroke(); }
            ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.font="bold 12px sans-serif";
            ctx.fillText(p.name, localX[uid], y-22);
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
