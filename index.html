<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平權不平權？— 社會地位馬拉松</title>
    <style>
        :root { --dark: #0f172a; --gold: #ffb700; --blue: #3b82f6; --red: #ef4444; --green: #22c55e; --panel: #1e293b; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--dark); color: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: #1e293b; width: 95%; max-width: 1200px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); margin: 20px; padding: 30px; border: 1px solid #334155; }
        .page { display: none; flex-direction: column; align-items: center; width: 100%; animation: slideUp 0.4s ease-out; }
        .page.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h1 { font-size: 3.5rem; color: var(--gold); margin: 10px 0; text-shadow: 3px 3px 0 #000; letter-spacing: -2px; }
        .slogan { font-style: italic; color: #94a3b8; margin-bottom: 30px; font-size: 1.1rem; }

        .q-display-board { background: #0f172a; border-left: 10px solid var(--gold); padding: 25px; width: 100%; border-radius: 15px; margin-bottom: 25px; box-sizing: border-box; }
        .q-text { font-size: 26px; font-weight: bold; color: var(--gold); line-height: 1.6; }
        .q-hidden { color: #475569; font-style: italic; font-weight: normal; }

        .btn { padding: 14px 28px; border-radius: 16px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 16px; color: white; margin: 6px; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; border-bottom: 2px solid #334155; }
        .tab-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 18px; font-weight: bold; padding: 12px; }
        .tab-btn.active { color: var(--gold); border-bottom: 4px solid var(--gold); }
        .admin-section { display: none; width: 100%; }
        .admin-section.active { display: flex; flex-direction: column; }

        .group-box { background: #334155; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #475569; }
        .group-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #475569; padding-bottom: 5px; }
        .editor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
        input, textarea { background: #0f172a; color: #fff; padding: 12px; border: 1px solid #475569; border-radius: 10px; width: 100%; box-sizing: border-box; }
        
        canvas { background: #1a1a1a; border-radius: 15px; width: 100%; border: 6px solid #334155; }
        .char-card { background: #2d3748; border: 2px solid #475569; padding: 15px; border-radius: 15px; cursor: pointer; text-align: center; }
        .char-card:hover { border-color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="page-home" class="page active">
        <h1>平權不平權？</h1>
        <div class="slogan">「教育是平等的，但社會資源是有厚度的。」</div>
        <div style="display:flex; flex-wrap: wrap; justify-content:center; gap: 20px;">
            <button class="btn" style="background:var(--blue); width:320px; height:100px; font-size:22px;" onclick="window.showPage('page-sim-select')">🎭 命運劇本<br><small style="font-weight:normal; font-size:12px;">(選擇內建模擬角色)</small></button>
            <button class="btn" style="background:var(--green); width:320px; height:100px; font-size:22px;" onclick="window.joinRealMode()">🏗️ 生存大亂鬥<br><small style="font-weight:normal; font-size:12px;">(依序產生匿名玩家序號)</small></button>
        </div>
        <button class="btn" style="background:#334155; font-size:12px; margin-top:50px; opacity:0.6" onclick="window.showPage('page-login')">🛡️ 命運掌控中心</button>
    </div>

    <div id="page-login" class="page">
        <h2>管理者驗證</h2>
        <input type="text" id="admin-user" placeholder="帳號">
        <input type="password" id="admin-pass" placeholder="密碼">
        <button class="btn" style="background:var(--blue); width:300px" onclick="window.verifyLogin()">驗證進入</button>
        <button class="btn" style="background:#475569; width:300px" onclick="window.showPage('page-home')">返回</button>
    </div>

    <div id="page-sim-select" class="page">
        <h2>請領取您的人生設定</h2>
        <div id="sim-char-list" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%;"></div>
        <button class="btn" style="background:#475569; margin-top:30px" onclick="window.showPage('page-home')">返回首頁</button>
    </div>

    <div id="page-game" class="page">
        <div class="q-display-board">
            <div id="current-q-text" class="q-text q-hidden">🔒 聽取導師佈題揭曉中...</div>
        </div>

        <div style="display:flex; justify-content: space-between; width:100%; align-items:center;">
            <div style="font-size:26px; font-weight:900;">關卡：【<span id="display-q-num">1</span>】</div>
            <div id="player-tag" style="font-weight:bold; padding: 10px 20px; border-radius:12px; border: 2px solid white;">身份載入中...</div>
        </div>
        
        <canvas id="mainCanvas" width="1000" height="420"></canvas>

        <div id="teacher-controls" class="page" style="display:none; padding:0;">
            <div class="tab-menu">
                <button id="tab-q" class="tab-btn active" onclick="window.switchTab('q')">五組分層題庫</button>
                <button id="tab-c" class="tab-btn" onclick="window.switchTab('c')">劇本背景編輯</button>
                <button id="tab-sys" class="tab-btn" onclick="window.switchTab('sys')">系統主控</button>
            </div>

            <div id="sec-q" class="admin-section active">
                <div style="background:#0f172a; padding:15px; border-radius:15px; margin-bottom:15px; display:flex; gap:10px; align-items:center;">
                    <b>題目導航：</b>
                    <button class="btn" style="background:#475569" onclick="window.dbChangeQ(-1)">◀ 上一題</button>
                    <span style="font-size:24px; color:var(--gold); font-weight:bold;">題號 <span id="admin-q-num">1</span></span>
                    <button class="btn" style="background:#475569" onclick="window.dbChangeQ(1)">下一題 ▶</button>
                    <button id="reveal-btn-admin" class="btn" onclick="window.dbToggleReveal(true)">👁️ 揭曉題目</button>
                    <button id="hide-btn-admin" class="btn" onclick="window.dbToggleReveal(false)">🔒 隱藏</button>
                </div>
                <div id="q-groups-container" style="max-height: 400px; overflow-y: auto;"></div>
            </div>

            <div id="sec-c" class="admin-section">
                <div id="char-editor-container" class="editor-grid" style="grid-template-columns: 1fr;"></div>
            </div>

            <div id="sec-sys" class="admin-section">
                <button id="pause-btn-admin" class="btn" style="width:100%; height:80px; font-size:24px;" onclick="window.dbTogglePause()">⏸ 啟動全體凍結</button>
                <button class="btn" style="background:var(--red); width:100%; margin-top:20px;" onclick="window.dbReset()">🧨 數據大清洗 (完全重置)</button>
            </div>
        </div>

        <div id="student-controls" style="margin-top:20px; text-align:center; width: 100%;">
            <p id="lock-msg" style="color:var(--red); font-size: 24px; font-weight:900; background:white; padding:15px; border-radius:12px; display:none; border: 4px solid var(--red);">⏸ 社會已暫停！請專心聽講 ⏸</p>
            <div id="move-btns-group">
                <div style="display:flex; gap:15px; justify-content:center;">
                    <button id="btn-back" class="btn" style="background:var(--red); width:170px; height:85px; font-size:20px;" onclick="window.dbMove(-1)">◀ 退後一步</button>
                    <button id="btn-stay" class="btn" style="background:#64748b; width:170px; height:85px; font-size:20px;" onclick="window.dbMove(0)">留在原地</button>
                    <button id="btn-forward" class="btn" style="background:var(--green); width:170px; height:85px; font-size:20px;" onclick="window.dbMove(1)">向前一步 ▶</button>
                </div>
                <button id="btn-undo" class="btn" style="background:#334155; width:80%; margin-top:15px; display:none;" onclick="window.dbUndo()">↺ 按錯了？本題重新選</button>
            </div>
            <p id="move-status-msg" style="margin-top:15px; color:var(--gold); font-weight:bold; font-size:18px;"></p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDyO58BVHMHr7hJIIchVDlq5uD91D5W0o",
      authDomain: "equity-game-a26fc.firebaseapp.com",
      databaseURL: "https://equity-game-a26fc-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "equity-game-a26fc",
      storageBucket: "equity-game-a26fc.firebasestorage.app",
      messagingSenderId: "247557188175",
      appId: "1:247557188175:web:84e3232995e337a273983a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'equity-game-v4-pro');

    let myUID = localStorage.getItem('equity_v4_pro_uid');
    let myRole = null; 
    let serverData = { q: 1, isRevealed: false, status: 'running', players: {}, questions: {}, configChars: [] };

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        document.getElementById('sec-'+tab).classList.add('active');
    };

    window.verifyLogin = () => {
        if(document.getElementById('admin-user').value === 'admin' && document.getElementById('admin-pass').value === '2803') {
            myRole = 'teacher';
            document.getElementById('teacher-controls').style.display = 'flex';
            document.getElementById('student-controls').style.display = 'none';
            document.getElementById('player-tag').innerText = "👨‍🏫 命運規劃師";
            window.showPage('page-game');
        } else { alert('身分驗證失敗'); }
    };

    window.joinSimMode = (idx) => {
        const char = serverData.configChars[idx];
        setupPlayer(char.name, char.color, "sim_" + idx);
    };

    window.joinRealMode = () => {
        if(myUID && myUID.startsWith('real_')) {
            setupPlayer(null, null, myUID);
        } else {
            // 計算現有序號
            const currentPlayers = Object.keys(serverData.players || {}).filter(k => k.startsWith('real_')).length;
            const nextID = currentPlayers + 1;
            setupPlayer("Player " + nextID, "#94a3b8", "real_" + Math.random().toString(36).substr(2, 5));
        }
    };

    function setupPlayer(name, color, uid) {
        myUID = uid; localStorage.setItem('equity_v4_pro_uid', uid); myRole = 'student';
        get(ref(db, `equity-game-v4-pro/players/${uid}`)).then((snap) => {
            const d = snap.val();
            update(ref(db, `equity-game-v4-pro/players/${uid}`), { 
                name: d?.name || name, color: d?.color || color, 
                pos: d?.pos || 0, startPosOfQ: d?.pos || 0, lastMovedQ: d?.lastMovedQ || 0 
            });
            document.getElementById('player-tag').innerText = (d?.name || name);
            document.getElementById('player-tag').style.background = d?.color || color;
            window.showPage('page-game');
        });
    }

    // --- 管理主控 ---
    window.dbChangeQ = (dir) => {
        const nextQ = serverData.q + dir;
        if(nextQ < 1 || nextQ > 50) return;
        const updates = { q: nextQ, isRevealed: false };
        for(let uid in serverData.players) { updates[`players/${uid}/startPosOfQ`] = serverData.players[uid].pos; }
        update(gameRef, updates);
    };

    window.dbToggleReveal = (show) => set(ref(db, 'equity-game-v4-pro/isRevealed'), show);
    
    window.dbTogglePause = () => set(ref(db, 'equity-game-v4-pro/status'), serverData.status === 'running' ? 'paused' : 'running');

    window.updateQuestionText = (idx) => {
        const txt = document.getElementById(`q-input-${idx}`).value;
        set(ref(db, `equity-game-v4-pro/questions/${idx}`), txt);
    };

    window.updateCharConfig = (idx) => {
        const n = document.getElementById(`c-n-${idx}`).value;
        const d = document.getElementById(`c-d-${idx}`).value;
        set(ref(db, `equity-game-v4-pro/configChars/${idx}`), { name: n, desc: d, color: serverData.configChars[idx].color });
    };

    window.dbReset = () => {
        if(!confirm("數據大清洗將歸零所有設定，確定嗎？")) return;
        const qBank = {}; for(let i=1; i<=50; i++) qBank[i] = `情境第 ${i} 題：尚未編輯內容...`;
        set(gameRef, { 
            q: 1, isRevealed: false, status: 'running', players: {}, questions: qBank,
            configChars: [
                {name: "達嗨", desc: "清晨 5:30 醒來，錯過 6:10 的公車就得走 40 分鐘山路。家裡只有一隻舊手機...", color: "#3b82f6"},
                {name: "維恩", desc: "200 坪豪宅醒來，有司機與保姆車，iPad 上有國際新聞。未來哈佛是理所當然...", color: "#fbbf24"},
                {name: "小明", desc: "普通家庭，蛋餅配賴床。有自己書桌但要共用電腦。無憂但平凡...", color: "#f472b6"},
                {name: "小晴", desc: "凌晨醒來幫奶奶換尿布，家裡的「小大人」。老師說她不愛讀書、沒潛力...", color: "#fb923c"},
                {name: "阿諾", desc: "雙腿萎縮需依賴輪椅。最孤獨的是體育課，世界到處都是過不去的隱形牆...", color: "#a78bfa"}
            ]
        });
        alert("數據已重置。");
    };

    // --- 學生移動 ---
    window.dbMove = (dir) => {
        const p = serverData.players[myUID];
        if(!p || serverData.status === 'paused') return;
        update(ref(db, `equity-game-v4-pro/players/${myUID}`), { 
            pos: Math.max(0, p.startPosOfQ + dir), lastMovedQ: serverData.q 
        });
    };

    window.dbUndo = () => {
        const p = serverData.players[myUID];
        update(ref(db, `equity-game-v4-pro/players/${myUID}`), { pos: p.startPosOfQ, lastMovedQ: 0 });
    };

    // --- 同步邏輯 ---
    onValue(gameRef, (snap) => {
        const d = snap.val(); if(!d) return;
        serverData = d; serverData.players = d.players || {};
        serverData.questions = d.questions || {};
        serverData.configChars = d.configChars || [];

        document.getElementById('display-q-num').innerText = d.q;
        document.getElementById('admin-q-num').innerText = d.q;
        
        // 教師端按鈕同步
        if(myRole === 'teacher') {
            const rBtn = document.getElementById('reveal-btn-admin');
            const hBtn = document.getElementById('hide-btn-admin');
            rBtn.style.background = d.isRevealed ? var(--green) : "#475569";
            rBtn.style.border = d.isRevealed ? "4px solid white" : "none";
            hBtn.style.background = !d.isRevealed ? var(--red) : "#475569";
            hBtn.style.border = !d.isRevealed ? "4px solid white" : "none";

            const pBtn = document.getElementById('pause-btn-admin');
            const isPaused = d.status === 'paused';
            pBtn.innerText = isPaused ? "▶ 恢復社會運作 (Resume)" : "⏸ 啟動全體凍結 (Freeze)";
            pBtn.style.background = isPaused ? var(--green) : "#f59e0b";
        }

        // 題目顯示
        const qBox = document.getElementById('current-q-text');
        if(d.isRevealed) {
            qBox.innerText = serverData.questions[d.q] || "尚未編輯內容...";
            qBox.classList.remove('q-hidden');
        } else {
            qBox.innerText = "🔒 聽取導師佈題揭曉中...";
            qBox.classList.add('q-hidden');
        }

        // 產生編輯器
        if(myRole === 'teacher') {
            const qContainer = document.getElementById('q-groups-container');
            if(qContainer.innerHTML === "") {
                const groups = ["第一組：起始資源", "第二組：教育機會", "第三組：健康醫療", "第四組：社會網絡", "第五組：終極競爭"];
                for(let g=0; g<5; g++){
                    let html = `<div class="group-box"><div class="group-title">${groups[g]}</div><div class="editor-grid">`;
                    for(let i=1; i<=10; i++) {
                        let idx = g*10 + i;
                        html += `<div>${idx}. <input id="q-input-${idx}" style="width:70%" value="${serverData.questions[idx] || ''}"> <button onclick="window.updateQuestionText(${idx})">存</button></div>`;
                    }
                    html += `</div></div>`;
                    qContainer.innerHTML += html;
                }
            }
            const cContainer = document.getElementById('char-editor-container');
            if(cContainer.innerHTML === "") {
                serverData.configChars.forEach((c, i) => {
                    cContainer.innerHTML += `<div class="group-box">${c.name}: <input id="c-n-${i}" value="${c.name}"> <textarea id="c-d-${i}">${c.desc}</textarea> <button onclick="window.updateCharConfig(${i})">存</button></div>`;
                });
            }
        }

        // 產生選擇列表
        const simList = document.getElementById('sim-char-list');
        if(simList.innerHTML === "") {
            serverData.configChars.forEach((c, i) => {
                simList.innerHTML += `<div class="char-card" onclick="window.joinSimMode(${i})"><b style="color:${c.color}">${c.name}</b><br><small style="color:#aaa">${c.desc.substring(0, 25)}...</small></div>`;
            });
        }

        // 學生互動控制
        if(myRole === 'student') {
            const p = serverData.players[myUID];
            const hasMoved = p && p.lastMovedQ === serverData.q;
            const isPaused = serverData.status === 'paused';
            document.getElementById('move-btns-group').style.display = isPaused ? "none" : "block";
            document.getElementById('lock-msg').style.display = isPaused ? "block" : "none";
            document.getElementById('btn-undo').style.display = (hasMoved && !isPaused) ? "inline-block" : "none";
            document.getElementById('move-status-msg').innerText = isPaused ? "⏸ 命運凍結中" : (hasMoved ? "✅ 已完成抉擇" : (d.isRevealed ? "⚡ 請點擊做出選擇" : "💭 聽取導師口述題目..."));
            document.getElementById('btn-stay').style.display = hasMoved ? "none" : "inline-block";
            document.getElementById('btn-back').style.display = hasMoved ? "none" : "inline-block";
            document.getElementById('btn-forward').style.display = hasMoved ? "none" : "inline-block";
        }
    });

    const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d');
    let localX = {};
    function render() {
        ctx.clearRect(0,0,1000,420);
        const sx = 150; const sd = 20;
        ctx.strokeStyle = "rgba(255,255,255,0.05)"; 
        for(let i=0; i<15; i++) ctx.strokeRect(20, 50+(i*25), 960, 25);
        ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(sx, 40); ctx.lineTo(sx, 410); ctx.stroke();
        ctx.fillStyle = "#22c55e"; ctx.font = "bold 14px sans-serif"; ctx.fillText("理想起跑線", sx-35, 30);

        Object.keys(serverData.players).forEach((uid, i) => {
            const p = serverData.players[uid];
            if(!localX[uid]) localX[uid] = sx;
            localX[uid] += (sx + (p.pos*sd) - localX[uid]) * 0.1;
            const y = 65 + (i*25);
            ctx.beginPath(); ctx.arc(localX[uid], y, 10, 0, Math.PI*2);
            ctx.fillStyle = p.color; ctx.fill();
            if(uid === myUID) { ctx.strokeStyle="#fff"; ctx.lineWidth=3; ctx.stroke(); }
            ctx.fillStyle="#cbd5e1"; ctx.textAlign="left"; ctx.font="10px sans-serif";
            ctx.fillText(p.name, localX[uid]+15, y+4);
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
