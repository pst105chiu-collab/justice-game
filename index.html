<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平全不平權？— 社會生存模擬器</title>
    <style>
        :root { --dark: #121212; --gold: #ffd700; --blue: #3182ce; --red: #e53e3e; --green: #38a169; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--dark); color: #eee; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: #1e1e1e; width: 95%; max-width: 1150px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); margin: 20px; padding: 30px; position: relative; border: 1px solid #333; }
        .page { display: none; flex-direction: column; align-items: center; width: 100%; animation: slideUp 0.4s ease-out; }
        .page.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 題目看板 */
        .q-display-board { background: #2d2d2d; border-left: 8px solid var(--gold); padding: 20px; width: 100%; border-radius: 12px; margin-bottom: 20px; min-height: 100px; display: flex; align-items: center; }
        .q-text { font-size: 24px; font-weight: bold; color: var(--gold); line-height: 1.5; }
        .q-hidden { color: #555; font-style: italic; font-weight: normal; }

        .btn { padding: 12px 24px; border-radius: 14px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 16px; color: white; margin: 5px; box-shadow: 0 4px 0px rgba(0,0,0,0.2); }
        .btn:disabled { background: #444 !important; opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        .btn-mode { width: 300px; height: 100px; font-size: 20px; }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; border-bottom: 1px solid #444; }
        .tab-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px; font-weight: bold; padding: 10px; }
        .tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .admin-section { display: none; width: 100%; flex-direction: column; }
        .admin-section.active { display: flex; }

        .editor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; width: 100%; max-height: 350px; overflow-y: auto; padding: 10px; background: #2d2d2d; border-radius: 8px; }
        input, textarea { background: #333; color: #fff; padding: 10px; border: 1px solid #444; border-radius: 10px; width: 100%; box-sizing: border-box; }
        
        canvas { background: #222; border-radius: 12px; width: 100%; margin: 20px 0; border: 4px solid #444; }
        #player-tag { font-size: 18px; padding: 10px 20px; border-radius: 10px; }
        
        .move-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .btn-move { width: 160px; height: 85px; font-size: 20px; border: 4px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-home" class="page active">
        <h1>平全不平權？</h1>
        <div style="display:flex; flex-wrap: wrap; justify-content:center; gap: 20px;">
            <button class="btn btn-mode" style="background:var(--blue)" onclick="window.showPage('page-sim-select')">🎭 角色模擬器</button>
            <button class="btn btn-mode" style="background:var(--green)" onclick="window.joinRealMode()">🏗️ 生存大亂鬥</button>
        </div>
        <button class="btn" style="background:#444; font-size:12px; margin-top:40px;" onclick="window.showPage('page-login')">⚙️ 命運掌控中心</button>
    </div>

    <div id="page-login" class="page">
        <h2>身分驗證</h2>
        <input type="text" id="admin-user" placeholder="帳號">
        <input type="password" id="admin-pass" placeholder="密碼">
        <button class="btn" style="background:var(--blue); width:280px" onclick="window.verifyLogin()">登入</button>
        <button class="btn" style="background:#555; width:280px" onclick="window.showPage('page-home')">取消</button>
    </div>

    <div id="page-sim-select" class="page">
        <h2>請選擇您的劇本</h2>
        <div id="sim-char-list" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%;"></div>
        <button class="btn" style="background:#555; margin-top:20px" onclick="window.showPage('page-home')">返回</button>
    </div>

    <div id="page-game" class="page">
        <div class="q-display-board">
            <div id="current-q-text" class="q-text q-hidden">等待命運規劃師佈題...</div>
        </div>

        <div style="display:flex; justify-content: space-between; width:100%; align-items:center;">
            <div style="font-size:24px; font-weight:900;">關卡：【<span id="display-q-num">1</span>】</div>
            <div id="player-tag" style="font-weight:bold;">連線中...</div>
        </div>
        
        <canvas id="mainCanvas" width="1000" height="420"></canvas>

        <div id="teacher-controls" class="page" style="display:none; padding:0;">
            <div class="tab-menu">
                <button id="tab-q" class="tab-btn active" onclick="window.switchTab('q')">題庫管理</button>
                <button id="tab-c" class="tab-btn" onclick="window.switchTab('c')">角色設定</button>
                <button id="tab-sys" class="tab-btn" onclick="window.switchTab('sys')">系統設置</button>
            </div>

            <div id="sec-q" class="admin-section active">
                <div style="background:#333; padding:15px; border-radius:12px; margin-bottom:15px; display:flex; align-items:center; gap:10px;">
                    <b>題目切換：</b>
                    <button class="btn" style="background:#555" onclick="window.dbChangeQ(-1)">◀ 前一題</button>
                    <span style="font-size:20px; font-weight:bold; color:var(--gold)">第 <span id="admin-q-num">1</span> 題</span>
                    <button class="btn" style="background:#555" onclick="window.dbChangeQ(1)">下一題 ▶</button>
                    <button id="reveal-btn" class="btn" style="background:var(--green)" onclick="window.dbToggleReveal(true)">👁️ 揭曉題目</button>
                    <button id="hide-btn" class="btn" style="background:var(--red)" onclick="window.dbToggleReveal(false)">🔒 隱藏</button>
                </div>
                <div class="editor-grid" id="q-bank-list"></div>
            </div>

            <div id="sec-c" class="admin-section">
                <div id="char-editor-container" class="editor-grid" style="grid-template-columns: 1fr;"></div>
            </div>

            <div id="sec-sys" class="admin-section">
                <button id="pause-btn" class="btn" style="background:#ed8936; width:100%" onclick="window.dbTogglePause()">⏸ 暫停操作</button>
                <button class="btn" style="background:var(--red); width:100%" onclick="window.dbReset()">🧨 數據徹底重置</button>
            </div>
        </div>

        <div id="student-controls" style="margin-top:20px; text-align:center; width:100%;">
            <p id="rule-tip" style="color:#aaa; font-size:14px; margin-bottom:10px;">請依據導師讀出的題目規則進行操作</p>
            <div id="move-btns" class="move-btns">
                <button id="btn-back" class="btn btn-move" style="background:var(--red)" onclick="window.dbMove(-1)">◀ 受挫/退後</button>
                <button id="btn-stay" class="btn btn-move" style="background:#555" onclick="window.dbMove(0)">保持原地</button>
                <button id="btn-forward" class="btn btn-move" style="background:var(--green)" onclick="window.dbMove(1)">努力/前進 ▶</button>
            </div>
            <button id="btn-undo" class="btn" style="background:#444; display:none; width:80%; margin-top:10px;" onclick="window.dbUndo()">↺ 重新考慮 (本題限改一次)</button>
            <p id="move-msg" style="color:var(--gold); font-weight:bold; margin-top:10px;"></p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDyO58BVHMHr7hJIIchVDlq5uD91D5W0o",
      authDomain: "equity-game-a26fc.firebaseapp.com",
      databaseURL: "https://equity-game-a26fc-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "equity-game-a26fc",
      storageBucket: "equity-game-a26fc.firebasestorage.app",
      messagingSenderId: "247557188175",
      appId: "1:247557188175:web:84e3232995e337a273983a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'equity-game-v-2026-pro-final');

    let myUID = localStorage.getItem('equity_2026_pro_final_uid');
    let myRole = null; 
    let serverData = { q: 1, isRevealed: false, status: 'running', players: {}, questions: {}, configChars: [] };

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        document.getElementById('sec-'+tab).classList.add('active');
    };

    window.verifyLogin = () => {
        if(document.getElementById('admin-user').value === 'admin' && document.getElementById('admin-pass').value === '2803') {
            myRole = 'teacher';
            document.getElementById('teacher-controls').style.display = 'flex';
            document.getElementById('student-controls').style.display = 'none';
            document.getElementById('player-tag').innerText = "👨‍🏫 管理員後台";
            window.showPage('page-game');
        } else { alert('驗證失敗'); }
    };

    window.joinSimMode = (idx) => {
        const char = serverData.configChars[idx];
        setupPlayer(char.name, char.color, "sim_" + idx);
    };

    window.joinRealMode = () => {
        if(myUID && myUID.startsWith('real_')) setupPlayer(null, null, myUID);
        else setupPlayer("Player " + Math.floor(Math.random()*99), "#718096", "real_" + Math.random().toString(36).substr(2, 5));
    };

    function setupPlayer(name, color, uid) {
        myUID = uid; localStorage.setItem('equity_2026_pro_final_uid', uid); myRole = 'student';
        get(ref(db, `equity-game-v-2026-pro-final/players/${uid}`)).then((snap) => {
            const d = snap.val();
            update(ref(db, `equity-game-v-2026-pro-final/players/${uid}`), { 
                name: d?.name || name, color: d?.color || color, 
                pos: d?.pos || 0, startPosOfQ: d?.pos || 0, lastMovedQ: d?.lastMovedQ || 0 
            });
            document.getElementById('player-tag').innerText = d?.name || name;
            document.getElementById('player-tag').style.background = d?.color || color;
            window.showPage('page-game');
        });
    }

    window.dbChangeQ = (dir) => {
        const nextQ = serverData.q + dir;
        if(nextQ < 1 || nextQ > 40) return;
        const updates = { q: nextQ, isRevealed: false };
        for(let uid in serverData.players) { updates[`players/${uid}/startPosOfQ`] = serverData.players[uid].pos; }
        update(gameRef, updates);
    };

    window.dbToggleReveal = (show) => set(ref(db, 'equity-game-v-2026-pro-final/isRevealed'), show);

    window.updateQuestionText = (idx) => {
        const txt = document.getElementById(`q-input-${idx}`).value;
        set(ref(db, `equity-game-v-2026-pro-final/questions/${idx}`), txt);
    };

    window.updateCharConfig = (idx) => {
        const n = document.getElementById(`c-n-${idx}`).value;
        const d = document.getElementById(`c-d-${idx}`).value;
        set(ref(db, `equity-game-v-2026-pro-final/configChars/${idx}`), { name: n, desc: d, color: serverData.configChars[idx].color });
    };

    window.dbTogglePause = () => set(ref(db, 'equity-game-v-2026-pro-final/status'), serverData.status === 'running' ? 'paused' : 'running');
    
    window.dbReset = () => {
        if(!confirm("數據重置後無法恢復，確定嗎？")) return;
        const qBank = {}; for(let i=1; i<=40; i++) qBank[i] = `情境題目第 ${i} 題...`;
        set(gameRef, { 
            q: 1, isRevealed: false, status: 'running', players: {}, questions: qBank,
            configChars: [
                {name: "達嗨", desc: "布農部落的晨光", color: "#3182ce"},
                {name: "維恩", desc: "豪宅裡的保姆車", color: "#ecc94b"},
                {name: "小明", desc: "平凡的蛋餅人生", color: "#f687b3"},
                {name: "小晴", desc: "市場裡的晚餐", color: "#f6ad55"},
                {name: "阿諾", desc: "輪椅外的圍牆", color: "#9f7aea"}
            ]
        });
        alert("重置完成");
    };

    // --- 學生移動邏輯：包含原地 ---
    window.dbMove = (dir) => {
        const p = serverData.players[myUID];
        if(!p || serverData.status === 'paused') return;
        // 如果 dir 為 0，則位置維持 startPosOfQ
        const newPos = p.startPosOfQ + dir;
        update(ref(db, `equity-game-v-2026-pro-final/players/${myUID}`), { 
            pos: Math.max(0, newPos), lastMovedQ: serverData.q 
        });
    };

    window.dbUndo = () => {
        const p = serverData.players[myUID];
        update(ref(db, `equity-game-v-2026-pro-final/players/${myUID}`), { 
            pos: p.startPosOfQ, lastMovedQ: 0 
        });
    };

    onValue(gameRef, (snap) => {
        const d = snap.val(); if(!d) return;
        serverData = d; serverData.players = d.players || {};
        serverData.questions = d.questions || {};
        serverData.configChars = d.configChars || [];

        document.getElementById('display-q-num').innerText = d.q;
        document.getElementById('admin-q-num').innerText = d.q;
        
        const qBox = document.getElementById('current-q-text');
        if(d.isRevealed) {
            qBox.innerText = serverData.questions[d.q] || "題目編輯中...";
            qBox.classList.remove('q-hidden');
        } else {
            qBox.innerText = "⏳ 聽取導師佈題中...";
            qBox.classList.add('q-hidden');
        }

        if(myRole === 'teacher') {
            document.getElementById('reveal-btn').style.border = d.isRevealed ? "4px solid white" : "none";
            document.getElementById('hide-btn').style.border = !d.isRevealed ? "4px solid white" : "none";
            const qList = document.getElementById('q-bank-list');
            if(qList.innerHTML === "") {
                for(let i=1; i<=40; i++) {
                    qList.innerHTML += `<div style="padding:5px;">題${i}: <input id="q-input-${i}" style="width:70%" value="${serverData.questions[i] || ''}"> <button onclick="window.updateQuestionText(${i})">存</button></div>`;
                }
            }
            const cList = document.getElementById('char-editor-container');
            if(cList.innerHTML === "") {
                serverData.configChars.forEach((c, i) => {
                    cList.innerHTML += `<div>${c.name}: <input id="c-n-${i}" value="${c.name}"> <input id="c-d-${i}" value="${c.desc}"> <button onclick="window.updateCharConfig(${i})">存</button></div>`;
                });
            }
        }

        const simList = document.getElementById('sim-char-list');
        if(simList.innerHTML === "") {
            serverData.configChars.forEach((c, i) => {
                simList.innerHTML += `<div class="char-card" onclick="window.joinSimMode(${i})"><b style="color:${c.color}">${c.name}</b><br><small>${c.desc}</small></div>`;
            });
        }

        if(myRole === 'student') {
            const p = serverData.players[myUID];
            const hasMoved = p && p.lastMovedQ === serverData.q;
            const isPaused = serverData.status === 'paused';
            document.getElementById('move-btns').style.display = hasMoved ? "none" : "flex";
            document.getElementById('btn-undo').style.display = (hasMoved && !isPaused) ? "inline-block" : "none";
            document.getElementById('move-msg').innerText = isPaused ? "⏸ 命運凍結中" : (hasMoved ? "✅ 已完成抉擇" : (d.isRevealed ? "⚡ 請點擊按鈕做出選擇" : "💭 聽導師口述題目..."));
        }
    });

    const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d');
    let localX = {};
    function render() {
        ctx.clearRect(0,0,1000,420);
        const sx = 150; const sd = 20;
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; 
        for(let i=0; i<12; i++) ctx.strokeRect(20, 50+(i*30), 960, 30);
        ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(sx, 40); ctx.lineTo(sx, 400); ctx.stroke();
        ctx.fillStyle = "#00ff00"; ctx.font = "bold 14px sans-serif"; ctx.fillText("理想起跑線", sx-35, 35);

        Object.keys(serverData.players).forEach((uid, i) => {
            const p = serverData.players[uid];
            if(!localX[uid]) localX[uid] = sx;
            localX[uid] += (sx + (p.pos*sd) - localX[uid]) * 0.1;
            const y = 65 + (i*30);
            ctx.beginPath(); ctx.arc(localX[uid], y, 12, 0, Math.PI*2);
            ctx.fillStyle = p.color; ctx.fill();
            if(uid === myUID) { ctx.strokeStyle="#fff"; ctx.lineWidth=3; ctx.stroke(); }
            ctx.fillStyle="#fff"; ctx.textAlign="left"; ctx.font="11px sans-serif";
            ctx.fillText(p.name, localX[uid]+18, y+4);
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
